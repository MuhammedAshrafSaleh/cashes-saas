name: cashes
description: "Multi-tenant SaaS app for construction cash disbursement management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  supabase_flutter: ^2.5.0
  go_router: ^14.0.0
  get_it: ^7.7.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.3.0
  pdf: ^3.10.0
  printing: ^5.12.0
  intl: any
  uuid: ^4.4.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.0.0
  logger: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
